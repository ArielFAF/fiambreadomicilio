<section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-24">
  <div class="mb-16">
    <h2 class="text-5xl font-serif mb-4">Otras variedades</h2>
    <p class="text-brand-text/70 text-lg">Te ofrecemos un abanico de opciones para que encuentres lo que buscas.</p>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
    @for (producto of productos(); track producto.id) {
      <app-producto-card [producto]="producto" (consultar)="onConsultar($event)"></app-producto-card>
    }
  </div>
</section>
